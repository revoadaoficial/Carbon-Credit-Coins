<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Carbon Credit Coin</title>
  <style>
    /* ===== Reset básico ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #2d6a4f, #95d5b2);
      overflow-x: hidden;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    header img {
      width: 80px;
      height: 80px;
    }

    h1 { font-size: 2.5rem; }

    .wallet {
      margin-bottom: 30px;
      text-align: center;
    }

    .wallet button {
      padding: 15px 30px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background-color: #1b4332;
      color: #fff;
      transition: 0.3s;
    }

    .wallet button:hover {
      background-color: #40916c;
    }

    .balance {
      margin-top: 15px;
      font-size: 1.2rem;
    }

    .report {
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 15px;
      width: 90%;
      max-width: 1200px;
      margin-bottom: 30px;
    }

    .report h2 {
      margin-bottom: 15px;
      text-align: center;
      color: #ffdd00;
    }

    .report table {
      width: 100%;
      border-collapse: collapse;
    }

    .report th, .report td {
      padding: 12px;
      border: 1px solid #fff;
      text-align: center;
    }

    .charts {
      width: 90%;
      max-width: 1200px;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      margin-bottom: 30px;
    }

    .chart-container {
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 15px;
      width: 350px;
    }

    footer {
      text-align: center;
      font-size: 0.9rem;
      margin-top: 20px;
    }

  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="./web3-connect.js"></script>
</head>
<body>

  <header>
    <img src="https://raw.githubusercontent.com/revoadaoficial/Carbon-Credit-Coins/main/logo.png" alt="Carbon Credit Coin Logo">
    <h1>Carbon Credit Coin</h1>
  </header>

  <div class="wallet">
    <button onclick="start()">Conectar Wallet</button>
    <div class="balance" id="wallet-status">Saldo disponível: $23,487,652,143.42 USD</div>
  </div>

  <div class="report">
    <h2>Relatório de Ativos - Carbon Credit Coin</h2>
    <table>
      <thead>
        <tr>
          <th>Categoria</th>
          <th>Investimento</th>
          <th>Valor (USD)</th>
        </tr>
      </thead>
      <tbody>
        <tr><td>Petróleo</td><td>B3</td><td>$8,250,000,000</td></tr>
        <tr><td>Ouro</td><td>B3</td><td>$7,125,000,000</td></tr>
        <tr><td>Criptoativos</td><td>Ethereum, USDT</td><td>$8,112,652,143.42</td></tr>
      </tbody>
    </table>
  </div>

  <div class="charts">
    <div class="chart-container">
      <canvas id="chart1"></canvas>
    </div>
    <div class="chart-container">
      <canvas id="chart2"></canvas>
    </div>
  </div>

  <footer>
    Copyright © 2026 Carbon Credit Coin. Todos os direitos reservados.
  </footer>

  <script>
    // ===== Charts =====
    const ctx1 = document.getElementById('chart1').getContext('2d');
    const chart1 = new Chart(ctx1, {
      type: 'pie',
      data: {
        labels: ['Petróleo', 'Ouro', 'Criptoativos'],
        datasets: [{
          data: [8250000000, 7125000000, 8112652143.42],
          backgroundColor: ['#ffdd00','#ffd500','#00b894']
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { position: 'bottom' }
        }
      }
    });

    const ctx2 = document.getElementById('chart2').getContext('2d');
    const chart2 = new Chart(ctx2, {
      type: 'bar',
      data: {
        labels: ['Petróleo', 'Ouro', 'Criptoativos'],
        datasets: [{
          label: 'Investimentos USD',
          data: [8250000000, 7125000000, 8112652143.42],
          backgroundColor: ['#ffdd00','#ffd500','#00b894']
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false }
        },
        scales: {
          y: { beginAtZero: true }
        }
      }
    });

    // ===== Wallet connect placeholder =====
    function start() {
      const status = document.getElementById('wallet-status');
      status.innerText = "Wallet conectada: 0x25b0e8ecd3054bb022cf702645c2344524e2c26b";
    }

  </script>
</body>
</html>
