<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Carbon Credit Coin Wallet</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Estilo CSS -->
<style>
  body {
    margin: 0;
    font-family: 'Roboto', sans-serif;
    background: #0a1a2a;
    color: #fff;
    overflow-x: hidden;
  }
  header {
    text-align: center;
    padding: 30px 10px;
  }
  h1 {
    font-size: 2.5rem;
    color: #00ff99;
  }
  #saldo {
    font-size: 1.5rem;
    margin-bottom: 20px;
  }
  .wallet-btn {
    background: #00ff99;
    border: none;
    padding: 12px 25px;
    font-size: 1.1rem;
    font-weight: bold;
    border-radius: 10px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: 0.3s;
  }
  .wallet-btn:hover {
    transform: scale(1.05);
  }
  .wallet-btn img {
    width: 25px;
    height: 25px;
  }
  #wallet-status {
    margin-top: 20px;
    font-size: 1.1rem;
    text-align: center;
  }
  canvas {
    max-width: 90%;
    margin: 30px auto;
    display: block;
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    padding: 15px;
  }
  /* Fundo interativo com partículas simples */
  #particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
  }
</style>
</head>
<body>

<!-- Fundo interativo -->
<canvas id="particles"></canvas>

<header>
  <h1>Carbon Credit Coin</h1>
  <p id="saldo">Saldo disponível: US$ 23,347,981,532.72</p>
  <button class="wallet-btn" onclick="connectWallet()">
    <img src="https://raw.githubusercontent.com/revoadaoficial/Carbon-Credit-Coins/main/logo.png" alt="CCC Logo">
    Conectar Wallet
  </button>
  <div id="wallet-status"></div>
</header>

<!-- Gráficos de investimentos -->
<canvas id="investChart"></canvas>

<!-- Scripts -->
<script type="module">

// Fundo de partículas simples
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const particlesArray = [];
class Particle {
  constructor() {
    this.x = Math.random()*canvas.width;
    this.y = Math.random()*canvas.height;
    this.size = Math.random()*3+1;
    this.speedX = Math.random()*1-0.5;
    this.speedY = Math.random()*1-0.5;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    if(this.x < 0 || this.x > canvas.width) this.speedX *= -1;
    if(this.y < 0 || this.y > canvas.height) this.speedY *= -1;
  }
  draw() {
    ctx.fillStyle = "#00ff99";
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fill();
  }
}
function initParticles(){
  for(let i=0;i<150;i++){
    particlesArray.push(new Particle());
  }
}
function animateParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particlesArray.forEach(p=>{p.update();p.draw();});
  requestAnimationFrame(animateParticles);
}
initParticles();
animateParticles();

// Conexão fictícia de wallet
function connectWallet() {
  const status = document.getElementById('wallet-status');
  status.innerHTML = "Wallet conectada: 0x25b0e8...c26b";
}

// Gráfico de investimentos
const ctxChart = document.getElementById('investChart').getContext('2d');
const investChart = new Chart(ctxChart, {
    type: 'doughnut',
    data: {
        labels: ['Petróleo', 'Ouro', 'Criptoativos', 'B3'],
        datasets: [{
            label: 'Investimentos',
            data: [5000000000, 4300000000, 9800000000, 4200000000],
            backgroundColor: ['#f39c12','#f1c40f','#3498db','#2ecc71'],
            borderWidth: 1
        }]
    },
    options: {
        responsive:true,
        plugins:{
            legend:{
                position:'bottom',
                labels:{
                    color:'#fff'
                }
            }
        }
    }
});
</script>

</body>
</html>
